services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: kalshi-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: kalshi
      POSTGRES_PASSWORD: kalshi
      POSTGRES_DB: kalshi
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kalshi -d kalshi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
